services:
  # ── PostgreSQL Database ──────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: dermai_postgres
    environment:
      POSTGRES_DB: dermai_db
      POSTGRES_USER: dermai_user
      POSTGRES_PASSWORD: dermai_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dermai_user -d dermai_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dermai_network

  # ── Flask Backend ────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dermai_backend
    environment:
      DATABASE_URL: postgresql://dermai_user:dermai_pass@postgres:5432/dermai_db
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      SECRET_KEY: ${SECRET_KEY:-change-this-flask-secret}
      FLASK_ENV: production
      MOCK_INFERENCE: ${MOCK_INFERENCE:-true}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-}
      AWS_BUCKET: ${AWS_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/ml/saved_models:/app/ml/saved_models
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dermai_network
    restart: unless-stopped

  # ── React Frontend ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dermai_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - dermai_network
    restart: unless-stopped

  # ── Nginx Reverse Proxy ──────────────────────
  nginx:
    image: nginx:alpine
    container_name: dermai_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - dermai_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  dermai_network:
    driver: bridge
